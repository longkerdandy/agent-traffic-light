; PlatformIO Project Configuration File
;
; Build environment for the AgentCoreLight v1 ESP32-C3 firmware.
; This firmware is based on the official delivery package but adds BLE security
; configuration so that Windows 10/11 can pair with and control the device.

[env:esp32-c3]
platform = espressif32@6.8.1
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; Note: espressif32@6.8.1 bundles Arduino-ESP32 2.0.17, not 3.x. The source code
; has been adapted to use the 2.x LEDC API (ledcSetup/ledcAttachPin/ledcWrite).
