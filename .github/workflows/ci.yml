name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: server/global.json

      - name: Restore
        run: dotnet restore server/agent-signal-bridge.sln

      - name: Build
        run: dotnet build server/agent-signal-bridge.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test server/agent-signal-bridge.sln --no-build --configuration Release --verbosity normal

      - name: Format check
        run: |
          dotnet format server/agent-signal-bridge.sln --verify-no-changes --verbosity detailed
          dotnet format server/agent-signal-bridge.sln --verify-no-changes --verbosity detailed style

  firmware-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: ./firmware/esp32_c3_traffic_light
        run: pio run
